<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Detalles de la Cita — Mara Flamini</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'brand-light': '#fff3f0',
            'brand-bg': '#e8d4cd',
            'brand': '#ba8c84',
            'brand-dark': '#9e7162',
            'brand-soft': '#f7e8e4',
          },
        },
      },
    };
  </script>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="gradient-background min-h-screen flex flex-col">
  <div id="toast-container"></div>

  <!-- Header -->
  <header class="w-full p-2">
    <a href="index.html" class="inline-flex items-center gap-2 md:px-4 md:py-2 bg-brand text-white rounded-lg hover:bg-brand-dark transition-colors text-sm sm:text-base">
      <i data-lucide="arrow-left" class="w-4 h-4 sm:w-5 sm:h-5"></i>
      <span class="hidden sm:inline">Inicio</span>
      <i data-lucide="home" class="w-4 h-4 sm:w-5 sm:h-5"></i>
    </a>
  </header>

  <!-- Main content (rendered by cita.js) -->
  <div class="flex-1 flex items-center justify-center p-4">
    <div id="cita-root" class="max-w-3xl w-full"></div>
  </div>

  <footer class="mt-12 py-6 border-t border-brand/20">
    <div class="container mx-auto px-4 text-center text-sm text-brand">
      <p>MaxTurnos - Sistema de Reserva de Turnos</p>
    </div>
  </footer>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="js/data.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/handoff.js"></script>
  <script src="js/cita.js"></script>
</body>
</html>
